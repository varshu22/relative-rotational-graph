name: Update RRG data

# Runs automatically on a schedule, and can also be run by hand from the
# Actions tab (workflow_dispatch).
on:
  schedule:
    # GitHub cron is ALWAYS in UTC. India is UTC+5:30.
    # NSE closes 15:30 IST. We fetch at 12:00 UTC = 17:30 IST (2h after close),
    # Tuesday–Saturday UTC so it covers Mon–Fri Indian trading days.
    - cron: "30 14 * * 2-6"
  workflow_dispatch: {}

# The job needs to write the updated files back to the repo.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas yfinance

      - name: Run the fetch + RRG update
        run: python fetch_update.py

      - name: Commit updated data if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.csv dashboard_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit (market likely closed)."
          else
            git commit -m "Auto-update RRG data ($(date -u +%Y-%m-%d))"
            git push
          fi
